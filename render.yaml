services:
  - type: web
    name: attendance-backend
    runtime: node
    plan: free
    rootDir: attendance-backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /api/health
